version: 2
# Temporarily pause Dependabot version-update PRs while GitHub-hosted Actions
# minutes are exhausted for this private repository.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:15"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tauri:
        patterns:
          - "@tauri-apps/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      frontend-tooling:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      tauri-runtime:
        patterns:
          - "tauri"
          - "tauri-*"
          - "wry"
          - "tao"
          - "muda"
          - "gtk*"
          - "glib*"
          - "gdk*"
          - "gio"
          - "webkit2gtk*"
          - "javascriptcore-rs"
          - "soup3"
      rust-patch:
        update-types:
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:45"
      timezone: "Europe/Vienna"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
