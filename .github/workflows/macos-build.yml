name: macOS package

on:
  pull_request:
    paths:
      - ".github/workflows/macos-build.yml"
      - "scripts/build-macos.sh"
      - "scripts/verify.mjs"
      - "scripts/check-tauri-surface.mjs"
      - "scripts/check-version-consistency.mjs"
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "src-tauri/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  package:
    name: Build DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build macOS app and DMG
        shell: bash
        run: ./scripts/build-macos.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS checksum
        uses: actions/upload-artifact@v4
        with:
          name: macos-sha256sum
          path: target/release/bundle/dmg/*.sha256
          if-no-files-found: error
