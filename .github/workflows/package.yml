name: Package artifacts

on:
  workflow_dispatch:

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo "APPLE_CERTIFICATE is not configured; macOS build will use ad-hoc signing."
            exit 0
          fi
          if [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD are required when APPLE_CERTIFICATE is set" >&2
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
            if [[ -z "$cert_id" ]]; then
              cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/"/ {print $2; exit}')"
            fi
            if [[ -z "$cert_id" ]]; then
              echo "No codesigning identity was imported" >&2
              exit 1
            fi
            echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          fi

      - name: Prepare Apple notarization API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_P8_BASE64:-}" ]]; then
            echo "APPLE_API_KEY_P8_BASE64 is not configured; skipping App Store Connect notarization key setup."
            exit 0
          fi
          if [[ -z "${APPLE_API_KEY:-}" || -z "${APPLE_API_ISSUER:-}" ]]; then
            echo "APPLE_API_KEY and APPLE_API_ISSUER are required when APPLE_API_KEY_P8_BASE64 is set" >&2
            exit 1
          fi
          mkdir -p private_keys
          api_key_path="$PWD/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=$APPLE_API_KEY" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"

      - name: Prepare Apple ID notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_ID:-}" || -n "${APPLE_PASSWORD:-}" || -n "${APPLE_TEAM_ID:-}" ]]; then
            if [[ -z "${APPLE_ID:-}" || -z "${APPLE_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
              echo "APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID must be configured together" >&2
              exit 1
            fi
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          else
            echo "Apple ID notarization credentials are not configured."
          fi

      - name: Build macOS app and DMG
        shell: bash
        run: ./scripts/build-macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/dmg/*.sha256
          if-no-files-found: error

  windows:
    name: Build Windows MSI and NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build Windows installers
        shell: pwsh
        env:
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
        run: .\scripts\build-windows.ps1

      - name: Smoke MSI install and uninstall
        shell: pwsh
        run: .\scripts\smoke-windows-msi.ps1

      - name: Upload MSI smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi-smoke-logs
          path: target\release\bundle\msi-smoke\*.log
          if-no-files-found: ignore

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-installers
          path: |
            target\release\bundle\msi\*.msi
            target\release\bundle\nsis\*.exe
            target\release\bundle\SHA256SUMS.txt
          if-no-files-found: error
