name: RustSec audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "24 6 * * 1"
  workflow_dispatch:

concurrency:
  group: rust-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Cargo audit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1

      - name: Run RustSec audit
        run: ./scripts/audit-rust.sh
