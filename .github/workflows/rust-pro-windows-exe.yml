name: Rust Pro Windows EXE

on:
  push:
    branches:
      - main
      - codex/rust-pro-windows-exe
    tags:
      - "v*"
      - "rust-pro-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build portable Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: satellite_data_toolkit_rust -> satellite_data_toolkit_rust/target

      - name: Build release executable
        shell: pwsh
        run: cargo build --release --locked --manifest-path satellite_data_toolkit_rust/Cargo.toml

      - name: Package portable executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path satellite_data_toolkit_rust\dist | Out-Null
          Copy-Item satellite_data_toolkit_rust\target\release\satellite_data_toolkit.exe satellite_data_toolkit_rust\dist\SatelliteDataToolkitPro.exe -Force

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SatelliteDataToolkitPro-windows-x64
          path: satellite_data_toolkit_rust\dist\SatelliteDataToolkitPro.exe
          if-no-files-found: error

      - name: Publish portable EXE to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $asset = "satellite_data_toolkit_rust\dist\SatelliteDataToolkitPro.exe"
          $notes = "Satellite Data Toolkit Pro portable Windows x64 executable."

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title "Satellite Data Toolkit $tag" --notes $notes
          }

          gh release upload $tag --repo $repo $asset --clobber
