name: Windows package

on:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  package:
    name: Build MSI and NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build Windows installers
        shell: pwsh
        env:
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
        run: .\scripts\build-windows.ps1

      - name: Smoke MSI install and uninstall
        shell: pwsh
        run: .\scripts\smoke-windows-msi.ps1

      - name: Upload MSI smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi-smoke-logs
          path: target\release\bundle\msi-smoke\*.log
          if-no-files-found: ignore

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: target\release\bundle\msi\*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-nsis
          path: target\release\bundle\nsis\*.exe
          if-no-files-found: error

      - name: Upload Windows checksums
        uses: actions/upload-artifact@v7
        with:
          name: windows-sha256sums
          path: target\release\bundle\SHA256SUMS.txt
          if-no-files-found: error
