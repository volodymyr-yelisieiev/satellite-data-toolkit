name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and publish"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-preflight:
    name: Release credential preflight
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require public release signing secrets
        shell: bash
        env:
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: bash ./scripts/check-release-secrets.sh

  rust-audit:
    name: RustSec audit
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.1

      - name: Run RustSec audit
        run: ./scripts/audit-rust.sh

  windows:
    name: Build Windows installers
    runs-on: windows-latest
    needs:
      - release-preflight
      - rust-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build Windows installers
        shell: pwsh
        env:
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
        run: .\scripts\build-windows.ps1

      - name: Smoke MSI install and uninstall
        shell: pwsh
        run: .\scripts\smoke-windows-msi.ps1

      - name: Upload MSI smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-msi-smoke-logs
          path: target\release\bundle\msi-smoke\*.log
          if-no-files-found: ignore

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            target\release\bundle\msi\*.msi
            target\release\bundle\nsis\*.exe
          if-no-files-found: error

  macos:
    name: Build macOS DMG
    runs-on: macos-latest
    needs:
      - release-preflight
      - rust-audit
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      SATELLITE_REQUIRE_MACOS_NOTARIZATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Import Apple Developer certificate
        if: env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_PASSWORD:-}" || -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD are required when APPLE_CERTIFICATE is set" >&2
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

          if [[ -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
            if [[ -z "$cert_id" ]]; then
              cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/"/ {print $2; exit}')"
            fi
            if [[ -z "$cert_id" ]]; then
              echo "No codesigning identity was imported" >&2
              exit 1
            fi
            echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          fi

      - name: Prepare Apple notarization API key
        if: env.APPLE_API_KEY_P8_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY:-}" || -z "${APPLE_API_ISSUER:-}" ]]; then
            echo "APPLE_API_KEY and APPLE_API_ISSUER are required when APPLE_API_KEY_P8_BASE64 is set" >&2
            exit 1
          fi
          mkdir -p private_keys
          api_key_path="$PWD/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Build macOS app and DMG
        shell: bash
        run: ./scripts/build-macos.sh

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    needs:
      - windows
      - macos
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -exec cp '{}' release-assets/ \;
          if ! find release-assets -type f ! -name 'SHA256SUMS.txt' -print -quit | grep -q .; then
            echo "No release artifacts were downloaded" >&2
            exit 1
          fi
          (cd release-assets && sha256sum * > SHA256SUMS.txt)

          notes="Cross-platform Satellite Data Toolkit release with macOS DMG and Windows MSI/NSIS installers. See README.md and docs/PACKAGING.md for signing, notarization, and platform QA status."

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" --repo "$GH_REPO" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "Satellite Data Toolkit $TAG_NAME" --notes "$notes" release-assets/*
          fi
