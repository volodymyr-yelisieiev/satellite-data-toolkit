name: Windows release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build Windows installers
        shell: pwsh
        run: .\scripts\build-windows.ps1

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target\release\bundle\msi\*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: target\release\bundle\nsis\*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $assets = @(
            (Get-ChildItem -Path "target\release\bundle\msi" -Filter "*.msi" -ErrorAction Stop).FullName
            (Get-ChildItem -Path "target\release\bundle\nsis" -Filter "*.exe" -ErrorAction Stop).FullName
          )
          $notes = "Windows patch release. Fixes Windows launch so the app opens without an extra terminal window."

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag --repo $repo @assets --clobber
          } else {
            gh release create $tag --repo $repo --title "Satellite Data Toolkit $tag" --notes $notes @assets
          }
